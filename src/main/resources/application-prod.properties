#IMPORT .ENV
spring.config.import=optional:file:.env[.properties]
#DATABASE CONNECTION
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# COOKIE NAME
cineflux.app.jwtCookieName=${COOKIE_NAME}
# PUBLIC KEY
app.public-key=classpath:app.pub
# PRIVATE KEY
app.private-key=classpath:app.key